micronaut:
  application:
    name: tours-service
  server:
    port: 8001
    cors:
      enabled: true
      configurations:
        web:
          allowedOrigins:
            - http://localhost:3000
            - http://localhost:3001
            - http://localhost:5173
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders:
            - Content-Type

logger:
  levels:
    root: INFO
    com.tours: INFO

datasources:
  default:
    url: jdbc:sqlite:./data/tours.sqlite3
    driverClassName: org.sqlite.JDBC
    maximumPoolSize: 5
